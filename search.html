<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Search – Futec Solutions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script defer src="assets/js/main.js"></script>
  </head>
  <body class="lang-ko">
    <div data-include="header.html"></div>

    <main class="site-main">
      <section class="hero hero-sub">
        <div class="hero-content">
          <h1>
            <span class="lang-ko">사이트 검색</span>
            <span class="lang-en">Site Search</span>
          </h1>
          <p>
            <span class="lang-ko">
              입력하신 키워드로 퓨텍솔루션즈 웹사이트 내에서 검색합니다.
            </span>
            <span class="lang-en">
              Search across the Futec Solutions website using your keywords.
            </span>
          </p>
        </div>
      </section>

      <section class="section">
        <div class="section-inner narrow">
          <form class="search-form standalone-search" action="search.html" method="get">
            <label class="lang-ko" for="q-main">검색어</label>
            <label class="lang-en" for="q-main">Keyword</label>
            <div class="search-input-row">
              <input type="text" id="q-main" name="q" placeholder="Search..." />
              <button type="submit">
                <span class="lang-ko">검색</span>
                <span class="lang-en">Search</span>
              </button>
            </div>
          </form>

          <div id="searchResults" class="search-results">
            <p>
              <span class="lang-ko">검색 결과 예시는 추후 추가 예정입니다.</span>
              <span class="lang-en">Sample search results will be added later.</span>
            </p>
          </div>
        </div>
      </section>
    </main>

    <div data-include="footer.html"></div>
  </body>
</html>
